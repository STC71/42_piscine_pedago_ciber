# ============================================================================
#  CONFIGURACIÓN DE NGINX - Optimizada y Endurecida
# ============================================================================
#  Servidor web robusto para servicio oculto Tor
#  Logs estructurados, cabeceras de seguridad y caché inteligente
# ============================================================================

user www-data;
worker_processes auto;
worker_rlimit_nofile 65535;
pid /run/nginx.pid;

# ============================================================================
#  CONFIGURACIÓN CENTRAL
# ============================================================================

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    # ========================================================================
    #  CONFIGURACIÓN BÁSICA
    # ========================================================================

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;  # Oculta versión de Nginx

    # ========================================================================
    #  TIPOS MIME
    # ========================================================================

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ========================================================================
    #  REGISTRO - Salida estructurada en JSON
    # ========================================================================

    log_format json_combined escape=json '{'
        '"time_local":"$time_local",'
        '"remote_addr":"$remote_addr",'
        '"request":"$request",'
        '"status": $status,'
        '"bytes_sent": $bytes_sent,'
        '"request_time": $request_time,'
        '"http_referrer":"$http_referer",'
        '"http_user_agent":"$http_user_agent",'
        '"request_id":"$request_id"'
    '}';

    log_format brief '$remote_addr - [$time_local] "$request" $status $bytes_sent';

    access_log /var/log/nginx/access.log json_combined;
    error_log /var/log/nginx/error.log warn;

    # ========================================================================
    #  COMPRESIÓN GZIP
    # ========================================================================

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript;
    gzip_disable "msie6";

    # ========================================================================
    #  SERVIDOR POR DEFECTO (respaldo: rechaza todo)
    # ========================================================================

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;
        return 444;  # Cierra la conexión
    }

    # ========================================================================
    #  HOST VIRTUAL PRINCIPAL (Servicio Oculto)
    # ========================================================================

    server {
        listen 127.0.0.1:80;
        listen [::1]:80;
        server_name localhost *.onion;

        # Raíz de documentos para archivos estáticos
        root /var/www/html;
        index index.html index.htm;

        # ====================================================================
        #  CABECERAS DE SEGURIDAD
        # ====================================================================

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' fonts.googleapis.com cdn.jsdelivr.net; font-src fonts.gstatic.com; img-src 'self' data:; connect-src 'self';" always;

        # ====================================================================
        #  ARCHIVOS ESTÁTICOS (HTML, CSS, JS)
        # ====================================================================

        location / {
            try_files $uri $uri/ =404;
            expires 1h;
            add_header Cache-Control "public, max-age=3600, must-revalidate";
            add_header X-Content-Type-Options "nosniff" always;
        }

        # ====================================================================
        #  RUTAS DE API (bonus: panel de control)
        # ====================================================================

        location /api/ {
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # Ruta de salud para orquestación de contenedores
        location /health {
            access_log off;
            return 200 "OK";
            add_header Content-Type "text/plain";
        }

        # ====================================================================
        #  DENEGAR RUTAS SENSIBLES
        # ====================================================================

        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~ ~$ {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~ /\.git {
            deny all;
        }

        # ====================================================================
        #  PÁGINAS DE ERROR
        # ====================================================================

        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;

        # ====================================================================
        #  REGISTRO
        # ====================================================================

        access_log /var/log/nginx/ft_onion_access.log json_combined;
        error_log /var/log/nginx/ft_onion_error.log warn;
    }
}
