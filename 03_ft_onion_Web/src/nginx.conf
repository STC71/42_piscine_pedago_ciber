# ============================================================================
#  CONFIGURACIÓN DE NGINX - Optimizada y Endurecida
# ============================================================================
#  Servidor web robusto para servicio oculto Tor
#  Logs estructurados, cabeceras de seguridad y caché inteligente
# ============================================================================

user www-data;              # Usuario no privilegiado para seguridad
worker_processes auto;      # Ajusta automáticamente según CPU
worker_rlimit_nofile 65535; # Aumenta límite de archivos abiertos a 65535
pid /run/nginx.pid;         # Archivo PID para gestión de procesos

# ============================================================================
#  CONFIGURACIÓN CENTRAL
# ============================================================================

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
} # Configuración de eventos para alto rendimiento

http {
    # ========================================================================
    #  CONFIGURACIÓN BÁSICA
    # ========================================================================
    
    sendfile on;                # Permite envío eficiente de archivos
    tcp_nopush on;              # Optimiza envío de archivos grandes
    tcp_nodelay on;             # Reduce latencia para pequeñas respuestas
    keepalive_timeout 65;       # Tiempo de espera para conexiones keep-alive
    types_hash_max_size 2048;   # Aumenta tamaño de hash para tipos MIME
    server_tokens off;          # Oculta versión de Nginx
    
    # ========================================================================
    #  TIPOS MIME
    # ========================================================================
    
    include /etc/nginx/mime.types;          # Tipos MIME estándar
    default_type application/octet-stream;  # Tipo por defecto para archivos desconocidos
    
    # ========================================================================
    #  REGISTRO - Salida estructurada en JSON
    # ========================================================================
    
    log_format json_combined escape=json '{'
        '"time_local":"$time_local",'
        '"remote_addr":"$remote_addr",'
        '"request":"$request",'
        '"status": $status,'
        '"bytes_sent": $bytes_sent,'
        '"request_time": $request_time,'
        '"http_referrer":"$http_referer",'
        '"http_user_agent":"$http_user_agent",'
        '"request_id":"$request_id"'
    '}';    # Formato de log en JSON para análisis avanzado.
    
    log_format brief '$remote_addr - [$time_local] "$request" $status $bytes_sent';
    
    access_log /var/log/nginx/access.log json_combined; # Logs de acceso en formato JSON
    error_log /var/log/nginx/error.log warn;            # Logs de error con nivel de advertencia
    
    # ========================================================================
    #  COMPRESIÓN GZIP
    # ========================================================================
    
    gzip on;                # Habilita compresión GZIP para mejorar rendimiento
    gzip_vary on;           # vary establece que la respuesta puede variar según el encabezado "Accept-Encoding"
    gzip_min_length 1024;   # Solo comprime respuestas mayores a 1KB
    gzip_proxied any;       # Comprime respuestas para cualquier solicitud proxy
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript;
    gzip_disable "msie6";   # Deshabilita GZIP para Internet Explorer 6 por problemas de compatibilidad
    
    # ========================================================================
    #  SERVIDOR POR DEFECTO (respaldo: rechaza todo)
    # ========================================================================
    
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;
        return 444;  # Cierra la conexión
    } # Servidor por defecto para rechazar solicitudes no deseadas
    
    # ========================================================================
    #  HOST VIRTUAL PRINCIPAL (Servicio Oculto)
    # ========================================================================
    
    server {
        listen 127.0.0.1:80;            # Escucha solo en localhost para seguridad
        listen [::1]:80;                # Escucha IPv6 en localhost para seguridad. IPv6 es la versión más reciente del protocolo de Internet, diseñada para reemplazar IPv4. IPv6 utiliza direcciones de 128 bits, lo que permite una cantidad mucho mayor de direcciones IP en comparación con IPv4, que utiliza direcciones de 32 bits. Escuchar en [::1] permite que el servidor acepte conexiones IPv6 desde localhost.
        server_name localhost *.onion;  # Acepta solicitudes para localhost y dominios .onion
        
        # Raíz de documentos para archivos estáticos
        root /var/www/html;             # Directorio raíz para archivos estáticos
        index index.html index.htm;     # Archivos de índice predeterminados
        
        # ====================================================================
        #  CABECERAS DE SEGURIDAD
        # ====================================================================
        
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' fonts.googleapis.com cdn.jsdelivr.net; font-src fonts.gstatic.com; img-src 'self' data:; connect-src 'self';" always;
        
        # ====================================================================
        #  ARCHIVOS ESTÁTICOS (HTML, CSS, JS)
        # ====================================================================
        
        location / {
            try_files $uri $uri/ =404;
            expires 1h;
            add_header Cache-Control "public, max-age=3600, must-revalidate";
            add_header X-Content-Type-Options "nosniff" always;
        } # Manejo de archivos estáticos con caché
        
        # ====================================================================
        #  RUTAS DE API (bonus: panel de control)
        # ====================================================================
        
        location /api/ {
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        } # Proxy para backend de API (ej. panel de control)
        
        # Ruta de salud para orquestación de contenedores
        location /health {
            access_log off;         # No registrar accesos a esta ruta
            return 200 "OK";        # Respuesta simple para monitoreo de salud
            add_header Content-Type "text/plain";   # Tipo de contenido para respuesta de salud
        } # Endpoint de salud para monitoreo
        
        # ====================================================================
        #  DENEGAR RUTAS SENSIBLES
        # ====================================================================
        
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        } # Archivos ocultos (ej. .htaccess, .env)
        
        location ~ ~$ {
            deny all;
            access_log off;
            log_not_found off;
        } # Archivos de respaldo (ej. index.html~)
        
        location ~ /\.git {
            deny all;
        } # Repositorios Git
        
        # ====================================================================
        #  PÁGINAS DE ERROR
        # ====================================================================
        
        error_page 404 /404.html;               # Página personalizada para errores 404
        error_page 500 502 503 504 /50x.html;   # Página personalizada para errores 5xx
        
        # ====================================================================
        #  REGISTRO
        # ====================================================================
        
        access_log /var/log/nginx/ft_onion_access.log json_combined;
        error_log /var/log/nginx/ft_onion_error.log warn;
        # Logs específicos para este host virtual, separados de los logs generales de Nginx para facilitar análisis y depuración.
    }
}
